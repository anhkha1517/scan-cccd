<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ZXING -->
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body { margin:0; background:black; color:white; text-align:center; font-family:sans-serif; }
#video { width:100%; max-width:400px; }
#result { margin-top:15px; }
.box {
  border: 3px solid lime;
  width: 250px;
  height: 250px;
  position: absolute;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<h2>📱 QUÉT CCCD (PRO)</h2>

<video id="video"></video>
<div class="box"></div>

<div id="result"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwBcbZ620CloYSkeX2peRu51R2mbonc4CT8m657gKRreAt9-l7QwsLgSB8OAJoqzyqIow/exec";

let lastScan = "";

// âm thanh
function beep(ok=true){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value = ok ? 900 : 300;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(), 120);
}

// rung
function vibrate(){
  if (navigator.vibrate) navigator.vibrate(100);
}

// xử lý scan
function handleResult(text){

  if (!text || text === lastScan) return;
  lastScan = text;

  console.log("SCAN:", text);

  let data = text.split("|");

  if (data.length < 2){
    document.getElementById("result").innerHTML =
      "<h2 style='color:red'>QR lỗi</h2>";
    beep(false);
    return;
  }

  let cccd = data[0];
  let ten = data[2] || "Không rõ";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ cccd, ten })
  })
  .then(res => res.json())
  .then(res => {

    let color = res.trangthai === "MỚI" ? "lime" : "red";

    document.getElementById("result").innerHTML =
      "<h1 style='color:"+color+"'>"+res.trangthai+"</h1>" +
      "<h1>ID: "+res.id+"</h1>" +
      "<h3>"+res.ten+"</h3>";

    beep(res.trangthai === "MỚI");
    vibrate();

  });

}

// start camera
async function start(){

  const codeReader = new ZXing.BrowserQRCodeReader();

  try {

    const videoInputDevices = await codeReader.listVideoInputDevices();

    if (videoInputDevices.length === 0){
      document.getElementById("result").innerHTML = "Không có camera";
      return;
    }
const track = stream.getVideoTracks()[0];
const capabilities = track.getCapabilities();

if (capabilities.zoom) {
  track.applyConstraints({
    advanced: [{ zoom: capabilities.zoom.max }]
  });
}
    // camera sau
    const selectedDeviceId = videoInputDevices[videoInputDevices.length - 1].deviceId;

    codeReader.decodeFromVideoDevice(
      selectedDeviceId,
      'video',
      (result, err) => {
        if (result) {
          handleResult(result.text);
        }
      }
    );

  } catch (err) {
    document.getElementById("result").innerHTML =
      "Lỗi camera: " + err;
  }

}

start();

</script>

</body>
</html>
