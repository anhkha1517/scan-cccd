<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="margin:0; background:black; color:white; text-align:center; font-family:sans-serif;">

<h2>📱 QUÉT CCCD</h2>

<div id="reader" style="width:100%; max-width:400px; margin:auto;"></div>

<div id="result" style="margin-top:20px;"></div>

<script>

// ===== CONFIG =====
const API_URL = "https://script.google.com/macros/s/AKfycbwBcbZ620CloYSkeX2peRu51R2mbonc4CT8m657gKRreAt9-l7QwsLgSB8OAJoqzyqIow/exec";

// ===== BIẾN =====
let lastScan = "";

// ===== ÂM THANH =====
function beep(ok=true){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value = ok ? 800 : 300;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(), 150);
}

// ===== XỬ LÝ SCAN =====
function onScanSuccess(decodedText){

  if (!decodedText || decodedText === lastScan) return;
  lastScan = decodedText;

  let data = decodedText.split("|");

  if (data.length < 2) {
    document.getElementById("result").innerHTML =
      "<h2 style='color:red'>❌ QR lỗi</h2>";
    beep(false);
    return;
  }

  let cccd = data[0];
  let ten = data[2] || "Không rõ";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ cccd, ten })
  })
  .then(res => res.json())
  .then(res => {

    let color = res.trangthai === "MỚI" ? "lime" : "red";

    document.getElementById("result").innerHTML =
      "<h1 style='color:"+color+"'>"+res.trangthai+"</h1>" +
      "<h1>ID: "+res.id+"</h1>" +
      "<h3>"+res.ten+"</h3>";

    beep(res.trangthai === "MỚI");

  })
  .catch(err => {
    document.getElementById("result").innerHTML =
      "<h2 style='color:red'>Lỗi API</h2>";
  });

}

// ===== START CAMERA =====
function startCamera(){

  Html5Qrcode.getCameras()
  .then(devices => {

    if (!devices || devices.length === 0) {
      document.getElementById("result").innerHTML = "Không có camera";
      return;
    }

    // 👉 camera sau
    let cameraId = devices[devices.length - 1].id;

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );

  })
  .catch(err => {
    document.getElementById("result").innerHTML =
      "Lỗi camera: " + err;
  });

}

// chạy sau khi load
window.onload = startCamera;

</script>

</body>
</html>
