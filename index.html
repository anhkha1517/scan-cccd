<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đăng ký nhân viên</title>
<style>
body { font-family: Arial; text-align: center; padding: 40px; }
input, select, button { padding: 10px; margin: 10px; width: 260px; }
#result { font-size: 22px; color: green; margin-top: 20px; }
</style>
</head>
<body>

<h2>Đăng ký nhân viên</h2>

<input id="name" placeholder="Họ và tên"><br>
<input id="cccd" placeholder="CCCD"><br>

<select id="gender">
  <option value="Nam">Nam</option>
  <option value="Nữ">Nữ</option>
</select><br>

<button id="btn" onclick="submitForm()">Đăng ký</button>

<div id="result"></div>

<script>
function submitForm(){
  var btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerText = "Đang xử lý...";

  var name = document.getElementById("name").value;
  var cccd = document.getElementById("cccd").value;
  var gender = document.getElementById("gender").value;

  fetch("LINK_API", {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body: "name=" + name + "&cccd=" + cccd + "&gender=" + gender
  })
  .then(res => res.text())
  .then(id => {
    document.getElementById("result").innerHTML =
      "✅ Mã nhân viên: <b>" + id + "</b>";
  })
  .catch(err => {
    alert("Lỗi, thử lại!");
    btn.disabled = false;
    btn.innerText = "Đăng ký";
  });
}
</script>

</body>
</html>
