<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body { margin:0; background:black; color:white; text-align:center; }
#video { width:100%; max-width:400px; }
</style>
</head>

<body>

<h2>📱 QUÉT CCCD</h2>
<video id="video"></video>
<div id="result"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwBcbZ620CloYSkeX2peRu51R2mbonc4CT8m657gKRreAt9-l7QwsLgSB8OAJoqzyqIow/exec";

let lastScan = "";

function handleResult(text){
  if (!text || text === lastScan) return;
  lastScan = text;

  let data = text.split("|");
  if (data.length < 2){
    document.getElementById("result").innerHTML = "QR lỗi";
    return;
  }

  let cccd = data[0];
  let ten = data[2] || "Không rõ";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ cccd, ten })
  })
  .then(res => res.json())
  .then(res => {
    document.getElementById("result").innerHTML =
      res.trangthai + " - ID: " + res.id;
  });
}

async function start(){

  const codeReader = new ZXing.BrowserQRCodeReader();

  try {

    // 👉 ÉP camera sau luôn
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    video.play();

    // 👉 FIX ZOOM (KHÔNG MAX)
    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();

    if (capabilities.zoom) {
      const zoomLevel = capabilities.zoom.min + (capabilities.zoom.max - capabilities.zoom.min) * 0.4;

      await track.applyConstraints({
        advanced: [{ zoom: zoomLevel }]
      });
    }

    // 👉 scan
    codeReader.decodeFromVideoElement(video, (result, err) => {
      if (result) {
        console.log("SCAN:", result.text);
        handleResult(result.text);
      }
    });

  } catch (err) {
    document.getElementById("result").innerHTML = "Lỗi: " + err;
  }
}

start();

</script>

</body>
</html>
